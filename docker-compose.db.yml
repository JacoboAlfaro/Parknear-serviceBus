services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: parknear-timescaledb
    env_file: .env.db
    environment:
      POSTGRES_DB: servicebus_db
    ports:
      - "5432:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d servicebus_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  timescaledb_data:
